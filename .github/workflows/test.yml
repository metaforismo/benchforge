name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm test
      - run: npm run toyfail:run
      - run: npm run toyfail:submit
      - run: npm run toyfail:verify:json
      - run: npm run toyfail:submissions
      - run: npm run toyfail:leaderboard
      - uses: actions/upload-artifact@v4
        with:
          name: toyfail-verifier-result
          path: challenges/toyfail/.benchforge/verifier-result.json
          if-no-files-found: error
