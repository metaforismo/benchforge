name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm test
      - run: npm run hosted:test
      - run: npm run toyfail:run
      - run: npm run toyfail:submit
      - run: npm run toyfail:verify:trusted
      - run: npm run toyfail:submissions
      - run: npm run toyfail:leaderboard
      - run: npm run toyfail:report
      - run: node ./packages/core/src/cli.js create ci-demo --name "CI Demo"
      - run: node ./challenges/ci-demo/bin/ci-demo.js run
      - uses: actions/upload-artifact@v4
        with:
          name: toyfail-verifier-result
          path: challenges/toyfail/.benchforge/verifier-result.json
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: toyfail-leaderboard-site
          path: challenges/toyfail/.benchforge/site
          if-no-files-found: error
      - name: Publish hosted verifier result
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          BENCHFORGE_API_URL: ${{ secrets.BENCHFORGE_API_URL }}
          BENCHFORGE_API_TOKEN: ${{ secrets.BENCHFORGE_API_TOKEN }}
        run: |
          if [ -z "$BENCHFORGE_API_URL" ] || [ -z "$BENCHFORGE_API_TOKEN" ]; then
            echo "Skipping hosted publish because BENCHFORGE_API_URL or BENCHFORGE_API_TOKEN is not configured."
            exit 0
          fi
          node ./challenges/toyfail/bin/toyfail.js publish-verification
